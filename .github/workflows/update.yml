name: Update Dependencies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run npm-check-updates to upgrade package.json
        run: bunx ncu -u

      - name: Install updated dependencies
        run: bun install --force

      - name: Bump Release Version
        id: release_version
        run: |
          if git diff --quiet -- package.json bun.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          version=$(LATEST_TAG="$latest_tag" bun run scripts/bump-version.ts)
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=v${version}" >> "$GITHUB_OUTPUT"

      - name: Commit and Push Updates
        if: steps.release_version.outputs.changed == 'true'
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add package.json bun.lock
          git commit -m "[WF]: Updated dependencies via ncu"
          git pull --rebase origin main
          git push

      - name: Create GitHub Release
        if: steps.release_version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_version.outputs.version }}" \
            --title "${{ steps.release_version.outputs.version }}" \
            --notes "Automated dependency update. Updated @wfcd/items and refreshed the generated lockfile." \
            --target "$(git rev-parse HEAD)" \
            --latest
